<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Test Enhanced Chat</title>
  </head>
  <body>
    <h1>Test Enhanced Chat (Beta 3)</h1>
    <script type="text/javascript">
      // 1) Listener ANTES del init (tal como indica Salesforce)
      window.addEventListener("onEmbeddedMessagingReady", function () {
        try {
          // Capturar el path y extraer el último segmento
          var currentPath = window.location.pathname; // Ej: /es/master-universitario/alimentacion-y-sostenibilidad
          var urlSegments = currentPath.split("/").filter(function (s) {
            return s.length > 0;
          });
          var lastSegment =
            urlSegments.length > 0 ? urlSegments[urlSegments.length - 1] : "";

          // 2) Enviar Hidden Pre-Chat fields DESPUÉS del Ready y ANTES de empezar conversación
          embeddedservice_bootstrap.prechatAPI.setHiddenPrechatFields({
            tipologiaURL: lastSegment,
          });

          // (opcional) log de verificación
          console.log("Hidden pre-chat tipologiaURL =", lastSegment);
        } catch (e) {
          console.error("Error seteando hidden pre-chat:", e);
        }
      });

      function initEmbeddedMessaging() {
        try {
          embeddedservice_bootstrap.settings.language = "es";

          embeddedservice_bootstrap.init(
            "00DUE000005T6S9",
            "Xat",
            "https://uvic--dev.sandbox.my.site.com/ESWXat1765448025141",
            {
              scrt2URL: "https://uvic--dev.sandbox.my.salesforce-scrt.com",
            },
          );
        } catch (err) {
          console.error("Error carregant Embedded Messaging: ", err);
        }
      }
    </script>
    <script
      type="text/javascript"
      src="https://uvic--dev.sandbox.my.site.com/ESWXat1765448025141/assets/js/bootstrap.min.js"
      onload="initEmbeddedMessaging()"
    ></script>
  </body>
</html>
