<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Test Enhanced Chat</title>
  </head>

  <body>
    <h1>Test Enhanced Chat (Beta 5)</h1>

    <!--Carga de la configuración externa del deployment.-->
    <script src="./js/embedded-messaging-config.js"></script>

    <script type="text/javascript">
      /**
       * APSP 25/01/2026
       * Obtiene el último segmento válido del path de la URL.
       */
      function getLastPathUrlSegment() {
        var path = window.location.pathname || "/";
        var segments = path.split("/").filter(function (str) {
          return str && str.length > 0;
        });

        var last = "";
        if (segments.length > 0) {
          last = segments[segments.length - 1];
        }

        try {
          return decodeURIComponent(last);
        } catch (e) {
          return last;
        }
      }

      /**
       * APSP 25/01/2026
       * Listener oficial de Embedded Messaging. (cuando el runtime está listo y permite)
       * Tiene la función de informar los Hidden Pre-Chat fields antes de iniciar la conversación.
       */
      window.addEventListener("onEmbeddedMessagingReady", function () {
        try {
          var retrieveConfig = window.EMBEDDED_MESSAGING_CONFIG;
          var lastSegment = getLastPathUrlSegment();

          var payload = {};
          payload[retrieveConfig.hiddenFieldName] = lastSegment;

          embeddedservice_bootstrap.prechatAPI.setHiddenPrechatFields(payload);
        } catch (e) {
          console.error(
            "[EmbeddedMessaging] Error estableciendo hidden pre-chat fields:",
            e,
          );
        }
      });

      /**
       * APSP 25/01/2026
       * Inicializa Embedded Messaging tras la carga del runtime (bootstrap.min.js).
       */
      function initEmbeddedMessaging() {
        try {
          var retrieveConfig = window.EMBEDDED_MESSAGING_CONFIG;

          if (
            !retrieveConfig ||
            !retrieveConfig.orgId ||
            !retrieveConfig.deploymentName ||
            !retrieveConfig.siteEndpoint ||
            !retrieveConfig.scrt2URL
          ) {
            throw new Error(
              "Configuración EMBEDDED_MESSAGING_CONFIG no informada.",
            );
          }

          embeddedservice_bootstrap.settings.language = retrieveConfig.language;

          embeddedservice_bootstrap.init(
            retrieveConfig.orgId,
            retrieveConfig.deploymentName,
            retrieveConfig.siteEndpoint,
            {
              scrt2URL: retrieveConfig.scrt2URL,
            },
          );
        } catch (err) {
          throw new Error(err);
        }
      }
    </script>

    <script
      type="text/javascript"
      src="https://uvic--dev.sandbox.my.site.com/ESWXat1765448025141/assets/js/bootstrap.min.js"
      onload="initEmbeddedMessaging()"
    ></script>
  </body>
</html>
